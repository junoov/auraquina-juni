services:
  # PHP Application (Laravel) + Built-in Web Server
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: auraquina-app
    container_name: auraquina-app
    restart: on-failure:5
    working_dir: /var/www
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www:cached
      - vendor:/var/www/vendor
      - node_modules:/var/www/node_modules
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: auraquina
      DB_USERNAME: root
      DB_PASSWORD: root
      COMPOSER_ALLOW_SUPERUSER: 1
    networks:
      - auraquina-network
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Database (MySQL) - Optimized
  mysql:
    image: mysql:8.0
    container_name: auraquina-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: auraquina
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - auraquina-db:/var/lib/mysql
      - ./auraquina-db-export.sql:/docker-entrypoint-initdb.d/auraquina-db-export.sql
    networks:
      - auraquina-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
    # MySQL performance tuning
    command: >
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=256M
      --innodb-log-file-size=64M
      --innodb-flush-log-at-trx-commit=2
      --innodb-flush-method=O_DIRECT
      --max-connections=100
      --query-cache-type=0
      --query-cache-size=0

  # Node.js (Vite Frontend) - No install needed
  node:
    image: node:20-alpine
    container_name: auraquina-node
    working_dir: /var/www
    command: sh -c "npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www:cached
      - node_modules:/var/www/node_modules
    networks:
      - auraquina-network
    depends_on:
      - app

networks:
  auraquina-network:
    driver: bridge

volumes:
  auraquina-db:
    driver: local
  vendor:
    driver: local
  node_modules:
    driver: local
