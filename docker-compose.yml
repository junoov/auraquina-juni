services:
  # PHP Application (Laravel)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: auraquina-app
    container_name: auraquina-app
    restart: on-failure:5
    working_dir: /var/www
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www:cached
      - vendor:/var/www/vendor
      - node_modules:/var/www/node_modules
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: auraquina
      DB_USERNAME: root
      DB_PASSWORD: root
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      COMPOSER_ALLOW_SUPERUSER: 1
    networks:
      - auraquina-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  # Database (MySQL) - Optimized
  mysql:
    image: mysql:8.0
    container_name: auraquina-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: auraquina
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - auraquina-db:/var/lib/mysql
      - ./auraquina-db-export.sql:/docker-entrypoint-initdb.d/auraquina-db-export.sql
    networks:
      - auraquina-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
    # MySQL performance tuning
    command: >
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=256M
      --innodb-redo-log-capacity=134217728
      --innodb-flush-log-at-trx-commit=2
      --innodb-flush-method=O_DIRECT
      --max-connections=100

  # Redis for Cache/Sessions (In-Memory)
  redis:
    image: redis:alpine
    container_name: auraquina-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - auraquina-network

  # Node.js (Vite Frontend) - No install needed
  node:
    image: node:20-alpine
    container_name: auraquina-node
    working_dir: /var/www
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www:cached
      - node_modules:/var/www/node_modules
    networks:
      - auraquina-network
    depends_on:
      - app

networks:
  auraquina-network:
    driver: bridge

volumes:
  auraquina-db:
    driver: local
  vendor:
    driver: local
  node_modules:
    driver: local
  redis-data:
    driver: local