services:
  # PHP Application (Laravel)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: auraquina-app
    container_name: auraquina-app
    restart: on-failure:5
    working_dir: /var/www
    ports:
      - "8001:8000"
    env_file:
      - .env.docker.example
    volumes:
      - .:/var/www:cached
      - ./.env.docker.example:/var/www/.env:ro
      - vendor:/var/www/vendor
      - node_modules:/var/www/node_modules
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: auraquina
      DB_USERNAME: root
      DB_PASSWORD: root
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      COMPOSER_ALLOW_SUPERUSER: 1
    networks:
      - auraquina-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    mem_limit: 512m

  # Database (MySQL) - Optimized
  mysql:
    image: mysql:8.0
    container_name: auraquina-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: auraquina
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - auraquina-db:/var/lib/mysql
      - ./auraquina-db-export.sql:/docker-entrypoint-initdb.d/auraquina-db-export.sql
    networks:
      - auraquina-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
    mem_limit: 512m
    # MySQL performance tuning (optimized for dev)
    command: >
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=128M
      --innodb-redo-log-capacity=67108864
      --innodb-flush-log-at-trx-commit=2
      --innodb-flush-method=O_DIRECT
      --max-connections=50
      --skip-log-bin

  # Redis for Cache/Sessions (In-Memory)
  redis:
    image: redis:alpine
    container_name: auraquina-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    networks:
      - auraquina-network
    mem_limit: 128m

  # Node.js (Vite Frontend) - Skip npm install if modules exist
  node:
    image: node:20-alpine
    container_name: auraquina-node
    working_dir: /var/www
    command: sh -c "[ -d node_modules/.package-lock.json ] && npm run dev -- --host 0.0.0.0 --port 5174 || (npm install && npm run dev -- --host 0.0.0.0 --port 5174)"
    ports:
      - "5174:5174"
    volumes:
      - .:/var/www:cached
      - node_modules:/var/www/node_modules
    networks:
      - auraquina-network
    depends_on:
      - app
    mem_limit: 512m

networks:
  auraquina-network:
    driver: bridge

volumes:
  auraquina-db:
    driver: local
  vendor:
    driver: local
  node_modules:
    driver: local
  redis-data:
    driver: local
