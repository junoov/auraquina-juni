services:
  # PHP Application (Laravel) + Built-in Web Server
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: auraquina-app
    container_name: auraquina-app
    restart: on-failure:5
    working_dir: /var/www
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: auraquina
      DB_USERNAME: root
      DB_PASSWORD: root
    networks:
      - auraquina-network
    depends_on:
      mysql:
        condition: service_healthy

  # Database (MySQL)
  mysql:
    image: mysql:8.0
    container_name: auraquina-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: auraquina
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - auraquina-db:/var/lib/mysql
      - ./auraquina-db-export.sql:/docker-entrypoint-initdb.d/auraquina-db-export.sql
    networks:
      - auraquina-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Node.js for Vite (Hot Reloading / Dev)
  node:
    image: node:20-alpine
    container_name: auraquina-node
    working_dir: /var/www
    volumes:
      - .:/var/www
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - auraquina-network
    depends_on:
      - app

networks:
  auraquina-network:
    driver: bridge

volumes:
  auraquina-db:
    driver: local
